# Import .env configuration file
spring.config.import=optional:file:.env[.properties]

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/pokemon_db}


# JWT Configurations
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Server Port
server.port=8080

# Actuator - expose health endpoint for Docker healthchecks & Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# VNPay Configurations
vnp.tmnCode=${VNP_TMN_CODE}
vnp.hashSecret=${VNP_HASH_SECRET}
vnp.payUrl=${VNP_PAY_URL}
vnp.returnUrl=${VNP_RETURN_URL}

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Store Bank Info for Withdraw
store.bank.name=${STORE_BANK_NAME:MB Bank}
store.bank.account=${STORE_BANK_ACCOUNT:1900123456789}
store.bank.holder=${STORE_BANK_HOLDER:Pokemon Card Store}

# Mail Configurations
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

