# Import .env configuration file
spring.config.import=optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT Configurations
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Server Port
server.port=8080

# Actuator - expose health endpoint for Docker healthchecks & Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# VNPay Configurations
vnp.tmnCode=${VNP_TMN_CODE}
vnp.hashSecret=${VNP_HASH_SECRET}
vnp.payUrl=${VNP_PAY_URL}
vnp.returnUrl=${VNP_RETURN_URL}
