# Production compose for Oracle Cloud (backend only)
# Image is built on GitHub Actions and pushed to GHCR. The server only PULLS
# it (no heavy Maven build on the small instance).
# MongoDB runs on a SEPARATE instance (129.80.234.30) with auth + firewall.
# Backend binds to localhost only; native Nginx reverse-proxies /api -> 8080.
services:
  backend:
    image: ghcr.io/tranhoangtrunghieu/pokemon-be:latest
    container_name: pokemon_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    # Cap JVM heap so it can't OOM the 1 GB instance
    mem_limit: 700m
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx448m -Xss512k
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-36000000}
      - VNP_TMN_CODE=${VNP_TMN_CODE}
      - VNP_HASH_SECRET=${VNP_HASH_SECRET}
      - VNP_PAY_URL=${VNP_PAY_URL}
      - VNP_RETURN_URL=${VNP_RETURN_URL}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
