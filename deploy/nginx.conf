# Production nginx reverse proxy for PokAcmon backend on Oracle Cloud
# API only. Place at /etc/nginx/sites-available/pokemon and enable it.
# Certbot will add the SSL block automatically.

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Let Certbot/ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All API traffic -> Spring Boot backend (bound to localhost:8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (chat) just in case
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Health check endpoint (no auth)
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080/actuator/health;
        proxy_set_header Host $host;
    }

    # Optional: serve the React frontend from /var/www/pokemon later.
    # Uncomment once you copy the built dist/ there.
    # location / {
    #     root /var/www/pokemon;
    #     try_files $uri /index.html;
    # }
}
