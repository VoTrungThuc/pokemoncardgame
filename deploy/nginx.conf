# Production nginx reverse proxy for PokAcmon backend on Oracle Cloud
# API only. Place at /etc/nginx/sites-available/pokemon and enable it.
# Certbot will add the SSL block automatically.

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Let Certbot/ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All API traffic -> Spring Boot backend (bound to localhost:8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (chat) just in case
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Proxy external Pokémon TCG images through our domain so the app does
    # not depend on the phone being able to reach the external CDN directly.
    # e.g. /img/swsh12pt5/100.png -> https://images.pokemontcg.io/swsh12pt5/100.png
    location /img/ {
        proxy_pass https://images.pokemontcg.io/;
        proxy_set_header Host images.pokemontcg.io;
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_set_header Referer "https://pokemontcg.io/";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_cache_valid 200 7d;
        proxy_intercept_errors on;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=604800";
        log_subrequest on;
        access_log /var/log/nginx/img_access.log;
        error_log /var/log/nginx/img_error.log;
    }

    # Health check endpoint (no auth)
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080/actuator/health;
        proxy_set_header Host $host;
    }

    # Serve uploaded chat images directly from the host volume
    location /uploads/ {
        alias /home/ubuntu/pokemon/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Serve static backend assets (gacha packs, default images, etc.)
    # e.g. /images/bronze_pack.png -> http://127.0.0.1:8080/images/bronze_pack.png
    location /images/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Optional: serve the React frontend from /var/www/pokemon later.
    # Uncomment once you copy the built dist/ there.
    # location / {
    #     root /var/www/pokemon;
    #     try_files $uri /index.html;
    # }
}
