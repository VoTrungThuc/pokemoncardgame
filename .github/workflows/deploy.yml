name: Deploy Backend (Oracle Cloud)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (build on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            # Get / update the code
            if [ -d ~/pokemon/.git ]; then
              cd ~/pokemon
              git fetch --all
              git reset --hard origin/main
            else
              git clone https://github.com/TranHoangTrungHieu/PRM-project.git ~/pokemon
              cd ~/pokemon
            fi

            # Write production .env from secrets
            cat > .env <<'EOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=36000000
            VNP_TMN_CODE=${{ secrets.VNP_TMN_CODE }}
            VNP_HASH_SECRET=${{ secrets.VNP_HASH_SECRET }}
            VNP_PAY_URL=${{ secrets.VNP_PAY_URL }}
            VNP_RETURN_URL=${{ secrets.VNP_RETURN_URL }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF
            chmod 600 .env

            # Build & restart containers
            sudo docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            sudo docker image prune -f
            sudo docker compose -f docker-compose.prod.yml ps
