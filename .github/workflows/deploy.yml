name: Deploy Backend (Oracle Cloud)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/pokemon-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (to have compose + nginx config)
        uses: actions/checkout@v4

      - name: Generate .env from secrets
        run: |
          cat > env.prod <<'EOF'
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
          VNP_TMN_CODE=${{ secrets.VNP_TMN_CODE }}
          VNP_HASH_SECRET=${{ secrets.VNP_HASH_SECRET }}
          VNP_PAY_URL=${{ secrets.VNP_PAY_URL }}
          VNP_RETURN_URL=${{ secrets.VNP_RETURN_URL }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          EOF

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/nginx.conf,env.prod"
          target: "~/pokemon"
          strip_components: 1

      - name: Deploy over SSH (pull image only, no build on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            export GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export GHCR_USER="${{ github.actor }}"

            sudo systemctl start docker

            cd ~/pokemon
            mv -f env.prod .env

            echo "==> login GHCR =="
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> reload nginx config =="
            sudo cp -f deploy/nginx.conf /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx || true

            echo "==> pull and run =="
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d

            echo "==> wait for health =="
            for i in $(seq 1 36); do
              if curl -sf -m 5 http://127.0.0.1:8080/actuator/health >/dev/null; then
                echo "HEALTHY after ${i}x5s"; break
              fi
              sleep 5
            done
            curl -s -m 5 -o /dev/null -w "health HTTP %{http_code}\n" http://127.0.0.1:8080/actuator/health || true
