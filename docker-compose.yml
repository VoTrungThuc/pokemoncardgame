version: '3.8'

services:
  # ─── MongoDB Database ────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: pokemon_mongodb
    restart: unless-stopped
    command: mongod --wiredTigerCacheSizeGB 0.25
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokemon_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/pokemon_db
      - JWT_SECRET=${JWT_SECRET:-mySuperSecretKeyWithLengthAtLeast256BitsThatIsSecureEnough}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-36000000}
      - VNP_TMN_CODE=${VNP_TMN_CODE:-dummy_tmn}
      - VNP_HASH_SECRET=${VNP_HASH_SECRET:-dummy_secret}
      - VNP_PAY_URL=${VNP_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      - VNP_RETURN_URL=${VNP_RETURN_URL:-http://localhost:8080/api/payment/vnpay-callback}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
      - JAVA_OPTS=-Xmx300m -XX:+UseG1GC
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── React Frontend (Nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    container_name: pokemon_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
